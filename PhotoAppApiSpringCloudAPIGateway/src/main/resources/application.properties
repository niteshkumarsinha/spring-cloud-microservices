spring.application.name=PhotoAppApiSpringCloudAPIGateway
server.port=8082
eureka.client.service-url.defaultZone=http://localhost:8010/eureka
api.login.url.path=/users/login
api.registration.url.path=/users
h2.console.url.path=/h2-console
#request sent to microservice using application name
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.routes[0].id=users-status-check
spring.cloud.gateway.routes[0].uri=lb://photoappusers
#spring.cloud.gateway.routes[0].predicates[0]=Path=/users/status/check
spring.cloud.gateway.routes[0].predicates[0]=Path=/users/status/check
spring.cloud.gateway.routes[0].predicates[1]=Method=GET
#spring.cloud.gateway.routes[0].predicates[2]=Header=Authorization, Bearer (.*)
spring.cloud.gateway.routes[0].filters[0]=RemoveRequestHeader=Cookie
#spring.cloud.gateway.routes[0].filters[1]=RewritePath=/photoappusers/(?<segment>.*), /$\{segment}



spring.cloud.gateway.routes[1].id=users-create
spring.cloud.gateway.routes[1].uri=lb://photoappusers
spring.cloud.gateway.routes[1].predicates[0]=Path=/users
spring.cloud.gateway.routes[1].predicates[1]=Method=POST
spring.cloud.gateway.routes[1].filters[0]=RemoveRequestHeader=Cookie

spring.cloud.gateway.routes[2].id=h2-console
spring.cloud.gateway.routes[2].uri=lb://photoappusers
spring.cloud.gateway.routes[2].predicates[0]=Path=/h2-console
spring.cloud.gateway.routes[2].predicates[1]=Method=GET
spring.cloud.gateway.routes[2].filters[0]=RemoveRequestHeader=Cookie



spring.cloud.gateway.routes[3].id=users-login
spring.cloud.gateway.routes[3].uri=lb://photoappusers
spring.cloud.gateway.routes[3].predicates[0]=Path=/users/login
spring.cloud.gateway.routes[3].predicates[1]=Method=POST
spring.cloud.gateway.routes[3].filters[0]=RemoveRequestHeader=Cookie